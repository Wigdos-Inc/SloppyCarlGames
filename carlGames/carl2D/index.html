<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carl is Mobile</title>
    <link rel="icon" type="image/png" href="carl.png">
    
    <!-- p5.js Library -->
    <script src="libraries/p5/p5.min.js"></script>
    <script src="libraries/p5/p5.sound.min.js"></script>

    <!-- Game Stylesheet -->
    <link rel="stylesheet" href="carl.css">
</head>
<body>
    <!-- Interaction Prompt (for audio permissions) -->
    <div id="interaction-prompt">
        <p>Click or press any key to start</p>
    </div>

    <!-- Intro Overlay -->
    <div id="intro-overlay">
        <img id="intro-logo" src="../../engine/v1/assets/carlStudios/sloppyCarl.png" alt="Sloppy Carl Studios">
    </div>

    <!-- Main Menu Overlay -->
    <div id="main-menu-overlay">
        <div id="ocean-bg"></div>

        <div id="menu-volume-control">
            <label for="menu-volume-slider">VOLUME</label>
            <input type="range" id="menu-volume-slider" class="volume-slider" min="0" max="100" value="100">
        </div>

        <div id="title-container">
            <img id="carl-character" src="carl.png" alt="Carl the Urgent Slug Urchin">
            <h1 id="game-title">CARL</h1>
            <p id="subtitle">IS</p>
            <p id="subtitle-2d">MOBILE</p>
            <p id="version-credit">Version 2.0.3: <strong>SUPER CARL</strong></p>
            <p id="dev-credit">Made by Claude Sonnet</p>
            <button id="start-button">Start Adventure</button>
        </div>
        <div id="wigdos-credit">Wigdos Studios Inc.</div>
    </div>

    <!-- Game Container -->
    <div id="game-container">
        <div id="hud">
            <div id="hud-left">
                <div id="distance-display">Time: <span id="distance">0:00.000</span></div>
                <div id="highscore-display">Best Time: <span id="highscore">--:--:---</span></div>
                <div id="speed-display" style="display: none;">Speed: <span id="speed">0</span></div>
            </div>
            <div id="hud-center">
            </div>
            <div id="hud-right">
                <button id="pause-button" onclick="pauseGame()">⏸</button>
            </div>
        </div>

        <div id="lives-display">Lives: <span id="lives">3</span></div>

        <div id="canvas-container"></div>

        <!-- Wigdos Studios Credit (visible during gameplay) -->
        <div id="wigdos-credit-game">Wigdos Studios Inc.</div>

        <!-- Pause Menu Overlay -->
        <div id="pause-menu" class="menu-overlay hidden">
            <div class="menu-content">
                <h2>PAUSED</h2>
                <p>Press ESC to resume</p>
                <button onclick="resumeGame()">Resume</button>
                <button onclick="returnToTitle()">Main Menu</button>
                <div id="pause-volume-control">
                    <h3 class="volume-label">VOLUME</h3>
                    <input type="range" id="pause-volume-slider" class="volume-slider" min="0" max="100" value="100">
                </div>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameover-menu" class="menu-overlay hidden">
            <div class="menu-content">
                <h2>GAME OVER</h2>
                <p id="final-distance">Time: 0:00.000</p>
                <p id="gameover-message">Carl got caught!</p>
                <button id="try-again-btn" onclick="restartGame()">Try Again</button>
                <button onclick="returnToTitle()">Main Menu</button>
            </div>
        </div>
    </div>

    <script>
        // ========== USER INTERACTION HANDLER ==========
        function handleUserInteraction() {
            const interactionPrompt = document.getElementById('interaction-prompt');
            interactionPrompt.classList.add('hidden');
            
            // Remove event listeners
            document.removeEventListener('click', handleUserInteraction);
            document.removeEventListener('keydown', handleUserInteraction);
            
            // Skip intro animation if already played this session, but still fade out the black overlay
            if (sessionStorage.getItem('carlIntroPlayed') === 'true') {
                const introOverlay = document.getElementById('intro-overlay');
                if (introOverlay) {
                    introOverlay.classList.add('fade-out');
                    setTimeout(() => introOverlay.remove(), 1000);
                }
            } else {
                sessionStorage.setItem('carlIntroPlayed', 'true');
                playIntroSequence();
            }
        }
        
        // ========== INTRO SEQUENCE ==========
        function playIntroSequence() {
            const introOverlay = document.getElementById('intro-overlay');
            const introLogo = document.getElementById('intro-logo');
            
            // Sequence timeline
            setTimeout(() => {
                // Step 2: Show logo with fade-in animation and play splat sound
                introLogo.classList.add('show');
                
                // Play splat sound at 1.5x speed
                if (window.introSplatSound && window.introSplatLoaded) {
                    window.introSplatSound.rate(1.5);
                    window.introSplatSound.play();
                }
                
                // Step 3: After 1 second, play sloppyCarl sound
                setTimeout(() => {
                    if (window.introSloppySound && window.introSloppyLoaded) {
                        window.introSloppySound.play();
                    }
                    
                    // Step 4: After sloppyCarl sound plays, fade out logo (1 second)
                    // Assuming sloppyCarl.mp3 duration is around 2-3 seconds, wait a bit
                    // We'll wait for the sound to finish or use a reasonable delay
                    const logoFadeDelay = window.introSloppySound && window.introSloppyLoaded 
                        ? (window.introSloppySound.duration() * 1000) 
                        : 2000; // fallback to 2 seconds
                    
                    setTimeout(() => {
                        introLogo.classList.add('fade-out');
                        
                        // Step 5: After logo fades (1 second), fade out black overlay
                        setTimeout(() => {
                            introOverlay.classList.add('fade-out');
                            
                            // Step 6: After overlay fades (1 second), remove it
                            setTimeout(() => {
                                introOverlay.remove();
                            }, 1000);
                        }, 1000);
                    }, logoFadeDelay);
                }, 1000);
            }, 1000); // Initial 1 second black screen
        }
        
        // ========== MENU SCRIPT ==========
        // Generate animated bubbles for menu
        function createBubbles() {
            const oceanBg = document.getElementById('ocean-bg');
            
            for (let i = 0; i < 30; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                const size = Math.random() * 30 + 10;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.animationDuration = (Math.random() * 10 + 8) + 's';
                bubble.style.animationDelay = Math.random() * 5 + 's';
                bubble.style.setProperty('--drift', (Math.random() * 100 - 50) + 'px');
                
                oceanBg.appendChild(bubble);
            }

            // Add coral decorations
            const coralLeft = document.createElement('div');
            coralLeft.className = 'coral coral-left';
            oceanBg.appendChild(coralLeft);

            const coralRight = document.createElement('div');
            coralRight.className = 'coral coral-right';
            oceanBg.appendChild(coralRight);

            // Add seaweed
            for (let i = 0; i < 8; i++) {
                const seaweed = document.createElement('div');
                seaweed.className = 'seaweed';
                seaweed.style.left = (Math.random() * 100) + '%';
                seaweed.style.animationDelay = (Math.random() * 2) + 's';
                seaweed.style.height = (Math.random() * 200 + 150) + 'px';
                oceanBg.appendChild(seaweed);
            }
        }

        function startGame() {
            // Hide main menu overlay
            const menuOverlay = document.getElementById('main-menu-overlay');
            menuOverlay.classList.add('hidden');

            // Clear focus so Space keyup cannot keep re-triggering the Start button.
            const startButton = document.getElementById('start-button');
            if (startButton) startButton.blur();
            if (document.activeElement && typeof document.activeElement.blur === 'function') {
                document.activeElement.blur();
            }
            
            // Start game music when the game actually begins
            if (window.gameMusic && window.gameMusicLoaded) {
                window.gameMusic.setVolume(0.5);
                window.gameMusic.loop();
            }
            
            // Start the game
            if (window.startGamePlay) {
                window.startGamePlay();
            }
        }

        // Set up button listener
        document.addEventListener('DOMContentLoaded', function() {
            // Set up interaction listeners
            document.addEventListener('click', handleUserInteraction);
            document.addEventListener('keydown', handleUserInteraction);
            
            document.getElementById('start-button').addEventListener('click', startGame);
            createBubbles();
            VolumeControl.init();
        });

        // Reload page on window resize
        window.addEventListener('resize', function() {
            location.reload();
        });

        // ========== VOLUME CONTROL ==========
        const VolumeControl = {
            STORAGE_KEY: 'carlVolume',

            getVolume() {
                const saved = localStorage.getItem(this.STORAGE_KEY);
                return saved !== null ? parseFloat(saved) : 100;
            },

            apply(val) {
                const v = val / 100;
                // p5.sound in this version uses outputVolume(), not masterVolume()
                if (typeof outputVolume === 'function') {
                    outputVolume(v, 0);
                }
            },

            syncSliders(val) {
                const menuSlider = document.getElementById('menu-volume-slider');
                const pauseSlider = document.getElementById('pause-volume-slider');
                if (menuSlider) menuSlider.value = val;
                if (pauseSlider) pauseSlider.value = val;
            },

            init() {
                const vol = this.getVolume();
                this.syncSliders(vol);
                // masterVolume is a p5 global - apply once p5 is ready
                // (safe to call immediately since p5.sound loads before this script)
                this.apply(vol);

                const self = this;
                const setupSlider = (id) => {
                    const slider = document.getElementById(id);
                    if (!slider) return;
                    slider.addEventListener('input', () => {
                        const v = parseFloat(slider.value);
                        self.apply(v);
                        self.syncSliders(v);
                    });
                    slider.addEventListener('change', () => {
                        localStorage.setItem(self.STORAGE_KEY, slider.value);
                    });
                };

                setupSlider('menu-volume-slider');
                setupSlider('pause-volume-slider');
            }
        };
        // Also expose for game.js to call after p5 setup if needed
        window.VolumeControl = VolumeControl;
    </script>

    <!-- Game Logic -->
    <script src="macro.js"></script>
    <script src="visual.js"></script>
    <script src="obstacles.js"></script>
    <script src="boss.js"></script>
    <script src="carl.js"></script>
    <script src="credits.js"></script>
    <script src="game.js"></script>
</body>
</html>
